<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're invited to Navy Care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: #a1a1aa; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary {
      background: #007AFF;
      color: white;
      margin-bottom: 12px;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #f5f5f7;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .spinner {
      display: none;
      font-size: 13px;
      color: #71717a;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💙</div>
    <h1>You're invited to a Care Circle</h1>
    <p>Someone has invited you to join their Navy Care circle and support their loved one.</p>
    <a id="openApp" class="btn btn-primary" href="#">Open in Navy Care</a>
    <a id="appStore" class="btn btn-secondary" href="https://apps.apple.com/app/navycare/id000000000" target="_blank">
      Download Navy Care
    </a>
    <p class="spinner" id="spinner">Opening the app…</p>
  </div>

  <script>
    (function () {
      // Extract token from path: /invite/{token}
      var parts = window.location.pathname.split('/').filter(Boolean);
      var token = parts[parts.length - 1] || '';

      if (!token || token === 'invite') {
        document.querySelector('p').textContent = 'This invitation link appears to be invalid.';
        document.getElementById('openApp').style.display = 'none';
        return;
      }

      // Deep link that opens the app directly
      var appURL     = 'navycare://invite/' + token;
      // App Store link (replace with real App Store URL when published)
      var appStoreURL = 'https://apps.apple.com/app/navycare/id000000000';

      document.getElementById('openApp').href = appURL;
      document.getElementById('appStore').href = appStoreURL;

      // Auto-attempt to open the app on page load
      document.getElementById('openApp').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('spinner').style.display = 'block';
        window.location.href = appURL;

        // After 2.5 seconds, if still on page, redirect to App Store
        setTimeout(function () {
          window.location.href = appStoreURL;
        }, 2500);
      });

      // On iOS, attempt auto-open after a brief delay
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      if (isIOS) {
        setTimeout(function () {
          window.location.href = appURL;
        }, 800);
      }
    })();
  </script>
</body>
</html>
